version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: modern-app:v2
    container_name: modern-app-web
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://your-synology-ip:8080"
      APP_KEY: "${APP_KEY:-base64:cXQo9+EVa+HwTjKsY9mHeltvIKOvNrZivx1t1H2Fddk=}"
      LOG_CHANNEL: stderr
      DB_CONNECTION: sqlite
      # DB_HOST: db
      # DB_PORT: 3306
      # DB_DATABASE: "${DB_DATABASE:-modern_app}"
      # DB_USERNAME: "${DB_USERNAME:-root}"
      # DB_PASSWORD: "${DB_PASSWORD:-secret}"
      CACHE_DRIVER: file
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file
      REDIS_HOST: redis
      REDIS_PASSWORD: null
      REDIS_PORT: 6379
    depends_on:
      - db
      - redis
    networks:
      - synology-network

  db:
    image: mysql:8.4
    container_name: modern-app-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-modern_app}"
      MYSQL_USER: "${DB_USERNAME:-modern_user}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - modern-app-mysql-data:/var/lib/mysql
    networks:
      - synology-network

  redis:
    image: redis:alpine
    container_name: modern-app-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - modern-app-redis-data:/data
    networks:
      - synology-network

networks:
  synology-network:
    driver: bridge

volumes:
  modern-app-mysql-data:
    driver: local
  modern-app-redis-data:
    driver: local
